name: smoke

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  public-smoke:
    name: Public package smoke tests
    runs-on: windows-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: apps/desktop-adapter/package-lock.json

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install test dependencies
        shell: pwsh
        run: python -m pip install --upgrade pip pytest

      - name: Check desktop adapter frontend
        shell: pwsh
        working-directory: apps/desktop-adapter
        run: |
          npm ci --ignore-scripts --no-audit
          npm run build

      - name: Check desktop adapter command runner
        shell: pwsh
        run: cargo test --manifest-path apps/desktop-adapter/src-tauri/Cargo.toml

      - name: Compile scripts
        shell: pwsh
        run: python -m compileall -q .claude/scripts

      - name: Run pytest smoke tests
        shell: pwsh
        run: python -m pytest

      - name: Audit local knowledge base
        shell: pwsh
        run: |
          python .claude/scripts/audit_kb.py
          python .claude/scripts/audit_kb.py --strict-reading --strict-concepts

      - name: Search local evidence
        shell: pwsh
        run: python .claude/scripts/kb_search.py "diffusion policy DLO" --limit 5

      - name: Check arXiv mirror status without creating a DB
        shell: pwsh
        run: |
          python .claude/scripts/arxiv_metadata_sync.py --status
          if (Test-Path "projects/arxiv-daily/metadata") {
            throw "arxiv_metadata_sync.py --status created projects/arxiv-daily/metadata"
          }

      - name: Check mirror-first dry-run stays local-only
        shell: pwsh
        run: |
          $output = python .claude/scripts/daily_arxiv_pipeline.py --dry-run --source mirror-first --max-candidates 5 --days-back 14 --idea-mode template --skip-read
          $output | Out-String | Write-Host
          if (($output -join "`n") -notmatch "source=mirror_missing") {
            throw "Expected mirror_missing in fresh clone dry-run"
          }
          if (($output -join "`n") -match "search_api") {
            throw "Fresh clone mirror-first dry-run unexpectedly used Search API fallback"
          }

      - name: Check Zotero preflight fails safely without private config
        shell: pwsh
        run: |
          $output = python .claude/scripts/zotero_import.py --preflight --json 2>&1
          $exitCode = $LASTEXITCODE
          $output | Out-String | Write-Host
          if ($exitCode -eq 0) {
            throw "Zotero preflight unexpectedly passed without private configuration"
          }
          if (($output -join "`n") -notmatch "missing_collection_key") {
            throw "Expected missing_collection_key in public fresh clone"
          }
          exit 0

      - name: Check scheduled task dry-run redaction
        shell: pwsh
        run: powershell -ExecutionPolicy Bypass -File .claude/scripts/register_daily_arxiv_task.ps1 -DryRun -Time "12:00"

      - name: Check tracked artifacts and secrets
        shell: pwsh
        run: python tools/scan_public_package.py
