name: smoke

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  public-smoke:
    name: Public package smoke tests
    runs-on: windows-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Compile scripts
        shell: pwsh
        run: python -m compileall -q .claude/scripts

      - name: Audit local knowledge base
        shell: pwsh
        run: |
          python .claude/scripts/audit_kb.py
          python .claude/scripts/audit_kb.py --strict-reading --strict-concepts

      - name: Search local evidence
        shell: pwsh
        run: python .claude/scripts/kb_search.py "diffusion policy DLO" --limit 5

      - name: Check arXiv mirror status without creating a DB
        shell: pwsh
        run: |
          python .claude/scripts/arxiv_metadata_sync.py --status
          if (Test-Path "projects/arxiv-daily/metadata") {
            throw "arxiv_metadata_sync.py --status created projects/arxiv-daily/metadata"
          }

      - name: Check mirror-first dry-run stays local-only
        shell: pwsh
        run: |
          $output = python .claude/scripts/daily_arxiv_pipeline.py --dry-run --source mirror-first --max-candidates 5 --days-back 14 --idea-mode template --skip-read
          $output | Out-String | Write-Host
          if (($output -join "`n") -notmatch "source=mirror_missing") {
            throw "Expected mirror_missing in fresh clone dry-run"
          }
          if (($output -join "`n") -match "search_api") {
            throw "Fresh clone mirror-first dry-run unexpectedly used Search API fallback"
          }

      - name: Check Zotero preflight fails safely without private config
        shell: pwsh
        run: |
          $output = python .claude/scripts/zotero_import.py --preflight --json 2>&1
          $exitCode = $LASTEXITCODE
          $output | Out-String | Write-Host
          if ($exitCode -eq 0) {
            throw "Zotero preflight unexpectedly passed without private configuration"
          }
          if (($output -join "`n") -notmatch "missing_collection_key") {
            throw "Expected missing_collection_key in public fresh clone"
          }

      - name: Check scheduled task dry-run redaction
        shell: pwsh
        run: powershell -ExecutionPolicy Bypass -File .claude/scripts/register_daily_arxiv_task.ps1 -DryRun -Time "12:00"

      - name: Check tracked artifacts and secrets
        shell: pwsh
        run: |
          $script = @'
          import pathlib
          import re
          import subprocess
          import sys

          files = subprocess.check_output(["git", "ls-files"], text=True).splitlines()
          artifact_re = re.compile(r"(?i)(\.pdf$|\.sqlite$|\.sqlite3$|\.db$|\.log$|\.pyc$|__pycache__/|\.env$|settings\.local\.json$|workspace\.json$)")
          artifacts = [path for path in files if artifact_re.search(path)]
          if artifacts:
              print("Tracked private/runtime artifacts:")
              print("\n".join(artifacts))
              sys.exit(1)

          sensitive_patterns = [
              r"sk-[A-Za-z0-9_-]{20,}",
              r"ghp_[A-Za-z0-9_]{20,}",
              r"github_pat_[A-Za-z0-9_]{20,}",
              r"AIza[A-Za-z0-9_-]{20,}",
              "PRIVATE " + "KEY",
              "BEGIN " + "RSA",
              "ANTHROPIC_AUTH_TOKEN" + r"=[^<]",
              "OPENAI_API_KEY" + r"=[^<]",
              "GEMINI_API_KEY" + r"=[^<]",
              "ZOTERO_API_KEY" + r"=[^<]",
              "H:" + r"\\",
              "C:" + r"\\Users\\Administrator",
              "hazel" + "666",
              "169884902hzl" + "@" + r"gmail\.com",
          ]
          secret_re = re.compile("|".join(sensitive_patterns))
          skip_prefixes = ("wiki/topics/",)
          hits = []
          for path in files:
              if path.startswith(skip_prefixes):
                  continue
              p = pathlib.Path(path)
              try:
                  text = p.read_text(encoding="utf-8")
              except UnicodeDecodeError:
                  continue
              except OSError:
                  continue
              if secret_re.search(text):
                  hits.append(path)
          if hits:
              print("Potential secret/private path hits:")
              print("\n".join(hits))
              sys.exit(1)
          print("artifact and secret scan ok")
          '@
          Set-Content -Path "$env:RUNNER_TEMP/scan_public.py" -Value $script -Encoding UTF8
          python "$env:RUNNER_TEMP/scan_public.py"
